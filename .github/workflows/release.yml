name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write # goreleaser creates the GitHub release and uploads assets

jobs:
  # Gate the release on a green end-to-end sync against real HTTPS Gitea.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          cache-dependency-path: mcp/git-server/go.sum
      - name: e2e (Gitea over HTTPS)
        run: make e2e

  release:
    needs: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # goreleaser needs full history + tags for the changelog
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          cache-dependency-path: mcp/git-server/go.sum
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Build release binaries with the patched stdlib regardless of the Go
          # the runner ships, matching the version CI validates against.
          GOTOOLCHAIN: go1.26.4

      # Pack the Claude Desktop / Cowork .mcpb bundles (one per target) and
      # attach them to the release goreleaser just created. The manifest version
      # must match the tag, or the bundles would ship mis-named/mis-versioned.
      - name: Build and attach .mcpb desktop-extension bundles
        run: |
          tag="${GITHUB_REF_NAME#v}"
          mver="$(python3 -c "import json; print(json.load(open('mcpb/manifest.json'))['version'])")"
          if [ "$tag" != "$mver" ]; then
            echo "::error::mcpb/manifest.json version ($mver) does not match tag ($GITHUB_REF_NAME); bump the manifest before tagging" >&2
            exit 1
          fi
          make mcpb-all
          gh release upload "$GITHUB_REF_NAME" dist/*.mcpb --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOTOOLCHAIN: go1.26.4
