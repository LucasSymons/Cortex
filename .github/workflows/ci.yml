name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

# The Go module lives in a subdirectory; default every run step to it.
# Jobs that need the repo root (gitleaks) override this.
defaults:
  run:
    working-directory: mcp/git-server

env:
  GO_VERSION: "1.26.4"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: mcp/git-server/go.sum
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          test -z "$out" || { echo "gofmt issues - run 'make fmt':"; echo "$out"; exit 1; }
      - name: go vet
        run: go vet ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: mcp/git-server/go.sum
      - name: test with coverage
        run: |
          go test ./... -count=1 -coverprofile=coverage.out
          go tool cover -func=coverage.out | tail -1

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: mcp/git-server/go.sum
      - name: cross-compile all platforms
        run: make build-all

  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: mcp/git-server/go.sum
      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.27.1
          "$(go env GOPATH)/bin/gosec" ./...

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: mcp/git-server/go.sum
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          "$(go env GOPATH)/bin/govulncheck" ./...

  gitleaks:
    runs-on: ubuntu-latest
    # Scan the whole repository from the root (the .gitleaks.toml lives there).
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
