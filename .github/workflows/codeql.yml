name: CodeQL

on:
  push:
  pull_request:
  # Weekly scan so newly-published CodeQL queries run against unchanged code.
  schedule:
    - cron: "30 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    name: analyze (go)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # publish findings to the Security tab
      actions: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          cache-dependency-path: mcp/git-server/go.sum
      # Go only supports autobuild or manual extraction. We build manually so
      # CodeQL traces the compile of the module under mcp/git-server/ (autobuild
      # fumbles non-root modules).
      - name: initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go
          build-mode: manual
      - name: build (traced by CodeQL)
        working-directory: mcp/git-server
        run: go build ./...
      - name: analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:go"
