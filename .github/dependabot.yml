version: 2
updates:
  # Go module (the cortex-git MCP server lives in a subdirectory).
  - package-ecosystem: gomod
    directory: /mcp/git-server
    schedule:
      interval: weekly
    labels: ["dependencies", "go"]
    commit-message:
      prefix: build
      include: scope
    groups:
      go-dependencies:
        patterns: ["*"]
    ignore:
      # mcp-go 0.18 -> 0.5x is a breaking API migration, tracked in
      # docs/TODO.md - remove this once the migration lands. Version-update
      # ignores do not suppress Dependabot security updates.
      - dependency-name: github.com/mark3labs/mcp-go

  # GitHub Actions used by the workflows (keeps action versions current,
  # including the Node runtime bumps).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: ci
      include: scope
    groups:
      actions:
        patterns: ["*"]

  # Base images for the end-to-end test harness (Gitea, Go, etc.).
  - package-ecosystem: docker
    directory: /e2e
    schedule:
      interval: weekly
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: ci
      include: scope
