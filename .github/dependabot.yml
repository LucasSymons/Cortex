version: 2
updates:
  # Go module (the cortex-git MCP server lives in a subdirectory).
  - package-ecosystem: gomod
    directory: /mcp/git-server
    schedule:
      interval: weekly
    labels: ["dependencies", "go"]
    commit-message:
      prefix: build
      include: scope
    groups:
      go-dependencies:
        patterns: ["*"]

  # GitHub Actions used by the workflows (keeps action versions current,
  # including the Node runtime bumps).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: ci
      include: scope
    groups:
      actions:
        patterns: ["*"]

  # Base images for the end-to-end test harness (Gitea, Go, etc.).
  - package-ecosystem: docker
    directory: /e2e
    schedule:
      interval: weekly
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: ci
      include: scope
